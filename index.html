<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-container">
        <h1>Etch-a-Sketch</h1>
        
        <div class="ui-section">
            
            <div class="bottom-section">
                <button class="reset-grid button">RESET</button>
                <button class="clear button">CLEAR</button>
                <button class="erase button">ERASE</button>
                <button class="opacity button">OPACITY</button>
                <label for="color-picker" class="button color-label">COLOR</label>
                <input type="color" id="color-picker" class="color-picker" value="#00ADB5">
                <button class="rgb button">RGB</button>
            </div> 
            <div class="grid-container"></div>
            
        </div>
        <div class="footer-text">Copyright &#0169 thegksingh</div>
        
    </div>
</body>
</html>
